name: CI go-web-infra

on:
  push:
    branches: [lib/go-web-infra]
  pull_request:
    branches: [lib/go-web-infra]
  workflow_dispatch: {}

concurrency:
  group: ci-go-web-infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod tidy && go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run vet
        run: go vet ./...

      - name: Check formatting
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "Unformatted files found:"
            echo "$fmt"
            exit 1
          fi

      - name: Build
        run: go build ./...

  tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/lib/go-web-infra'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          latest=$(git describe --tags --match="go-web-infra/v*" --abbrev=0 2>/dev/null || echo "go-web-infra/v0.0.0")
          echo "tag=$latest" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          latest="${{ steps.latest_tag.outputs.tag }}"
          # Extract version number (remove 'go-web-infra/v' prefix)
          version=${latest#go-web-infra/v}
          
          # Split version into components
          IFS='.' read -r major minor patch <<< "$version"
          
          # Increment patch version
          patch=$((patch + 1))
          
          new_version="go-web-infra/v$major.$minor.$patch"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "New version: $new_version"

      - name: Create tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "${{ steps.bump.outputs.new_version }}"
          git push origin "${{ steps.bump.outputs.new_version }}"
