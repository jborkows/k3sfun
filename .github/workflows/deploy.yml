name: Deploy Vikunja

on:
  push:
    branches: [vikunja]
    paths:
      - 'vikunja/**'
      - '.github/workflows/deploy.yml'
    tags:
      - "vikunja-*"
  workflow_dispatch: {}

concurrency:
  group: deploy-vikunja-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Vikunja with OIDC
    runs-on: k3s-home-runner
    container:
      image: bitnami/kubectl:latest
      options: --user 0 --network host
    env:
      DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      KUBECONFIG: ${{ github.workspace }}/.kubeconfig
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DOMAIN_NAME:-}" ]]; then
            echo "Missing required secret: DOMAIN_NAME" >&2
            exit 1
          fi
          if [[ -z "${KUBECONFIG_B64:-}" ]]; then
            echo "Missing required secret: KUBECONFIG_B64" >&2
            exit 1
          fi
          echo "::add-mask::${DOMAIN_NAME}"

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          echo "${KUBECONFIG_B64}" | base64 -d > "${KUBECONFIG}"
          chmod 600 "${KUBECONFIG}"
          kubectl get --raw='/readyz' >/dev/null

      - name: Ensure namespace exists
        shell: bash
        run: |
          set -euo pipefail
          kubectl get namespace vikunja >/dev/null 2>&1 || kubectl create namespace vikunja

      - name: Check OIDC secret exists
        shell: bash
        run: |
          set -euo pipefail
          if kubectl get secret vikunja-oidc -n vikunja >/dev/null 2>&1; then
            echo "OIDC secret exists - authentication will be enabled"
            echo "OIDC_ENABLED=true" >> $GITHUB_ENV
          else
            echo "::warning::OIDC secret 'vikunja-oidc' not found in namespace 'vikunja'"
            echo "::warning::Vikunja will be deployed but without OIDC authentication"
            echo "::warning::Create the secret manually using: kubectl create secret generic vikunja-oidc ..."
            echo "OIDC_ENABLED=false" >> $GITHUB_ENV
          fi

      - name: Deploy Vikunja manifests
        shell: bash
        run: |
          set -euo pipefail
          manifest_path="vikunja/vikunja.yaml"
          sed "s/DOMAIN/${DOMAIN_NAME}/g" "$manifest_path" | kubectl apply -f -

      - name: Wait for deployment
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/vikunja -n vikunja --timeout=180s || {
            echo "::error::Deployment did not become ready within timeout"
            echo "Pod status:"
            kubectl get pods -n vikunja
            echo ""
            echo "Recent events:"
            kubectl get events -n vikunja --sort-by='.lastTimestamp' | tail -20
            exit 1
          }

      - name: Deployment summary
        shell: bash
        run: |
          echo "======================================"
          echo "Vikunja deployed successfully!"
          echo "======================================"
          echo ""
          echo "URL: https://vikunja.${DOMAIN_NAME}"
          echo ""
          if [[ "${OIDC_ENABLED}" == "true" ]]; then
            echo "Authentication: OIDC enabled via Tailscale tsidp"
          else
            echo "Authentication: Local only (OIDC secret missing)"
          fi
          echo ""
          echo "Pod status:"
          kubectl get pods -n vikunja
          echo ""
          echo "Services:"
          kubectl get svc -n vikunja
          echo ""
          echo "Ingress:"
          kubectl get ingress -n vikunja
